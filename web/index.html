<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTS Chat Assistant</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__header">
          <div class="sidebar__title">
            <div class="main-title">
              <span class="main-icon"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="none" d="M0 0h24v24H0z"></path><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"></path><path d="M11.25 5h1.5v10h-1.5zM8.5 7H10v6H8.5zM6 9h1.5v2H6zM14 7h1.5v6H14zM16.5 9H18v2h-1.5z"></path></svg></span>
              <strong>TTS Chat Assistant</strong>
            </div>
            <p class="subtitle">Powered by LM Studio + Kokoro</p>
          </div>
          <button id="new-chat-btn" class="btn primary">New Chat</button>
        </div>
        <div id="chat-list" class="chat-list"></div>
        <button id="sidebar-toggle" class="sidebar__toggle" title="Toggle Sidebar">«</button>
      </aside>

      <main class="chat-panel">
        <header class="chat-toolbar">
          <div class="toolbar-actions">
            <label class="model-control">
              <span>Model</span>
              <select id="model-select"></select>
            </label>
            <label class="voice-control">
              <span>Voice</span>
              <select id="voice-select"></select>
            </label>
            <label class="temperature-control">
              <span>Temp</span>
              <input
                type="number"
                step="0.1"
                min="0"
                max="1"
                id="temperature-input"
              />
            </label>
            <button id="system-prompt-toggle" class="btn ghost" title="Edit system prompt">
              System prompt
            </button>
            <button id="redo-btn" class="btn ghost" title="Redo last response">
              Redo
            </button>
            <button
              id="stop-audio-btn"
              class="btn ghost"
              title="Stop current audio playback"
            >
              Stop Audio
            </button>
          </div>

          <section id="system-prompt-panel" class="system-prompt-panel hidden">
            <label for="system-prompt-input">System Prompt</label>
            <textarea id="system-prompt-input" rows="3"></textarea>
            <div class="panel-actions">
              <button id="apply-system-prompt" class="btn primary small">Apply</button>
              <button id="close-system-prompt" class="btn ghost small">Close</button>
            </div>
          </section>
        </header>

        <section id="status" class="status" role="status"></section>

        <section id="messages" class="messages"></section>

        <form id="composer" class="composer">
          <textarea
            id="prompt-input"
            placeholder="Type your next message..."
            rows="3"
            required
          ></textarea>
          <div class="composer__actions">
            <span id="pending-indicator" class="pending hidden">Thinking…</span>
            <button type="submit" class="btn primary">Send</button>
          </div>
        </form>
      </main>
    </div>

    <template id="message-template">
      <article class="message">
        <header class="message__head">
          <span class="message__role"></span>
          <div class="message__controls"></div>
        </header>
        <pre class="message__content"></pre>
      </article>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
